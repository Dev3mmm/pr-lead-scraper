name: Run App with Tunnel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-app:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
      
      - name: Start app and tunnel
        env:
          PORT: 5000
        run: |
          python app.py &
          APP_PID=$!
          sleep 8
          cloudflared tunnel --url http://localhost:5000 --no-autoupdate 2>&1 | tee /tmp/tunnel.log &
          sleep 15
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
          echo "=== LIVE APP URL: ${TUNNEL_URL} ==="
          # Post URL to GitHub issue comment
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": \"## App is LIVE\\n\\nURL: ${TUNNEL_URL}\\n\\nThis URL is valid for up to 6 hours.\"}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/1/comments" || true
          echo "URL posted to issue #1"
          # Keep running
          wait $APP_PID
