name: Run App with Tunnel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-app:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
      
      - name: Start app and tunnel
        run: |
          python app.py &
          APP_PID=$!
          sleep 5
          cloudflared tunnel --url http://localhost:10000 --no-autoupdate 2>&1 | tee /tmp/tunnel.log &
          sleep 10
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          echo "App running at: $TUNNEL_URL"
          # Post URL to GitHub issue comment
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": \"App is live at: $TUNNEL_URL\"}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/1/comments" || true
          wait $APP_PID
